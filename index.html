<style>

body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,sans-serif;background:var(--bg);color:var(--txt);min-height:100vh}
.shell{display:flex;min-height:100vh}

.s2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}

.sl{font-size:11px;color:var(--mut);font-weight:600;margin-bottom:5px}.sv{font-size:23px;font-weight:700;line-height:1}.su{font-size:12px;color:var(--mut);font-weight:400}

.tsw{position:relative;width:44px;height:24px;flex-shrink:0}.tsw input{opacity:0;width:0;height:0}

.efl{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.eflbl{font-size:11px;color:var(--mut);font-weight:600;margin-bottom:3px}

.psr{position:relative}

.popt:hover,.popt:active{background:var(--acc3)}.ponm{font-size:13px;font-weight:600}.pome{font-size:11px;color:var(--mut);font-family:monospace;margin-top:1px}
.li{background:var(--sur);border-radius:var(--rs);padding:11px 13px;margin-bottom:8px;border:.5px solid var(--bdr);display:flex;align-items:center;gap:11px;box-shadow:0 1px 2px rgba(37,99,235,.04)}
.lic{width:37px;height:37px;border-radius:9px;background:var(--acc2);display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0}

.mtile:hover,.mtile:active{border-color:var(--acc)}.mtic{width:42px;height:42px;background:var(--acc2);border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:19px}
.mtnm{font-size:14px;font-weight:700}.mtct{font-size:12px;color:var(--mut)}
.slbl{font-size:11px;font-weight:700;color:var(--acc);text-transform:uppercase;letter-spacing:.07em;margin:15px 0 8px}

// ── Draft helpers ──
function getDraftKey(type){
  try{
    if(type==='actual'){const sh=document.getElementById('act-sh')?.value||'s1';return`actDraft_${S.actStage}_${sh}`;}
    if(type==='plan'){const sh=document.getElementById('pf-shift')?.value||'s1';return`planDraft_${S.planStage}_${sh}`;}
  }catch(e){}return null;
}
function saveDraft(type){
  try{
    const k=getDraftKey(type);if(!k)return;
    const stage=type==='actual'?S.actStage:S.planStage;
    const data=type==='actual'?S.actReports:S.planReports;
    if(!stage||!Object.keys(data).length)return; // don't save empty/stageless drafts
    localStorage.setItem(k,JSON.stringify({stage,data}));
  }catch(e){}
}
function loadDraft(type){
  try{
    const k=getDraftKey(type);if(!k)return false;
    const d=localStorage.getItem(k);if(!d)return false;
    const saved=JSON.parse(d);
    const curStage=type==='actual'?S.actStage:S.planStage;
    // Support both old format (direct object) and new format ({stage, data})
    const stage=saved.stage||null;
    const data=saved.data||saved;
    // If stage info present, validate it matches current stage
    if(stage&&stage!==curStage)return false;
    if(!data||typeof data!=='object'||!Object.keys(data).length)return false;
    if(type==='actual')S.actReports=data;else S.planReports=data;
    return true;
  }catch(e){return false;}
}
function clearDraft(type){
  try{const k=getDraftKey(type);if(k)localStorage.removeItem(k);}catch(e){}
}

}

function go(scr,prev){
  S.prev=prev!==undefined?prev:S.cur;S.cur=scr;
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('on'));
  const el=document.getElementById('s-'+scr);if(el){el.classList.add('on');window.scrollTo(0,0)}
  ['home','plan','actual','reports','masters'].forEach(t=>{
    const a=t===scr||(t==='plan'&&['plan','plan-today','plan-next','view-plan'].includes(scr))||(t==='actual'&&['actual-hub','actual','view-actuals'].includes(scr))||(t==='masters'&&scr.startsWith('m-'));
    const nb=document.getElementById('nb-'+t),sb=document.getElementById('sb-'+t);
    if(nb)nb.classList.toggle('on',a);if(sb)sb.classList.toggle('on',a);
  });
}
function goBack(){go(S.prev||'home')}

let _gdCb=null,_gdInp=null;
function showGDrop(inp,matches,cb){
  const dr=document.getElementById('gdrop');
  if(!matches.length){dr.style.display='none';return}
  const r=inp.getBoundingClientRect();
  dr.style.left=r.left+'px';
  dr.style.width=r.width+'px';
  dr.style.top=(r.bottom+window.scrollY+4)+'px';
  dr.style.position='fixed';
  dr.style.top=(r.bottom+4)+'px';
  dr.innerHTML=matches.map(p=>`<div class="popt" onmousedown="event.preventDefault();pickGDrop('${p.id}')"><div class="ponm">${p.name}</div><div class="pome">${p.no} · ${p.cust}</div></div>`).join('');
  dr.style.display='block';
  _gdCb=cb;_gdInp=inp;
}
function hideGlobalDrop(){const dr=document.getElementById('gdrop');if(dr)dr.style.display='none';_gdCb=null;_gdInp=null}
function pickGDrop(pid){
  const p=S.parts.find(p=>p.id===pid);
  if(p&&_gdCb)_gdCb(p);
  hideGlobalDrop();
}

function getDefaultPerms(role){
  const d={
    operator:{plan:'full',actual:'full',reports:'view'},
    supervisor:{plan:'full',actual:'full',reports:'full'},
    manager:{plan:'view',actual:'view',reports:'full'},
    dispatch:{plan:'view',actual:'hidden',reports:'view'},
    owner:{plan:'hidden',actual:'hidden',reports:'full'},
    admin:{plan:'full',actual:'full',reports:'full'}
  };
  return d[role]||{plan:'hidden',actual:'hidden',reports:'view'};
}
function getPerm(screen){
  if(S.sess.role==='admin')return'full';
  const p=S.sess.permissions||getDefaultPerms(S.sess.role);
  return p[screen]||'hidden';
}
function isAdmin(){return S.sess&&S.sess.role==='admin'}
function canBackdate(){if(!S.sess)return false;if(S.sess.role==='admin')return true;if(S.sess.role==='manager'){const u=S.users.find(u=>u.id===S.sess.userId);return u?.allowBackdate===true;}return false;}

}

function validatePlanReports(){
  const errs=[];
  Object.values(S.planReports).forEach(r=>{
    const nm=r.machineName||'Machine';
    if(r.used===null||r.used===undefined){errs.push(nm+': Please indicate if machine will be used');}
    else if(r.used){
      (r.runs||[]).forEach((run,idx)=>{
        const rn=nm+' Run '+(idx+1);
        if(!run.partId)errs.push(rn+': Part is required');
        if(!run.opId)errs.push(rn+': Operation is required');
        if(!run.hoursPlanned)errs.push(rn+': Estimated hours required');
        if(!run.plannedQty)errs.push(rn+': Planned qty required');
      });
      if(r.hasDowntime){
        if(!r.downtimeReason)errs.push(nm+': Downtime reason is required');
        if(!r.downtimeMins)errs.push(nm+': Downtime duration is required');
      }
    }else{
      if(!r.unusedReason)errs.push(nm+': Please select reason for not using');
    }
  });
  return errs;
}
function validateActualReports(){
  const errs=[];
  Object.values(S.actReports).forEach(r=>{
    const nm=r.machineName||'Machine';
    if(r.used===null||r.used===undefined){errs.push(nm+': Please indicate if machine was used');}
    else if(r.used){
      if(!r.operatorId)errs.push(nm+': Operator is required');
      (r.runs||[]).forEach((run,idx)=>{
        const rn=nm+' Run '+(idx+1);
        if(!run.partId)errs.push(rn+': Part is required');
        if(!run.opId)errs.push(rn+': Operation is required');
        if(!run.hoursRun)errs.push(rn+': Hours run is required');
        if(run.actualQty===''||run.actualQty===undefined)errs.push(rn+': Actual qty is required');
        if(run.rejectionQty===''||run.rejectionQty===undefined)errs.push(rn+': Rejection qty is required (0 if none)');
      });
      if(r.hasOtherDowntime){
        if(!r.otherDowntimeReason)errs.push(nm+': Downtime reason is required');
        if(!r.otherDowntimeMins)errs.push(nm+': Downtime duration is required');
      }
    }else{
      if(!r.unusedReason)errs.push(nm+': Please select reason for not using');
    }
  });
  return errs;
}

        supervisorId:supEl?supEl.value:'',machineReports:reports,

}

function setVARange(type){

async function rfva(){
  // If selected date range is outside the 90-day listener window, fetch from Firestore directly
  const ago90=new Date();ago90.setDate(ago90.getDate()-90);const ago90S=ago90.toISOString().slice(0,10);
  const fromDate=_vadFrom||_vad;
  if(fromDate<ago90S){
    const w=document.getElementById('va-res');if(w)w.innerHTML='<div class="tsm tmut" style="padding:16px;text-align:center">Fetching older records...</div>';
    try{
      const sn=await db.collection('actuals').where('date','>=',fromDate).where('date','<=',_vad).get();
      const fetched=sn.docs.map(d=>({id:d.id,...d.data()}));
      // Merge into S.actuals without duplicates
      fetched.forEach(f=>{if(!S.actuals.find(a=>a.id===f.id))S.actuals.push(f);});
    }catch(e){console.error(e);}
  }

    const sh=S.shifts[a.shift];const used=a.machineReports?a.machineReports.filter(r=>r.used):[];

    const act=used.reduce((s,r)=>s+(r.runs||[]).reduce((ss,run)=>ss+(+run.actualQty||0),0),0);
    const eff=tgt>0?Math.round(act/tgt*100):0;
    return`<div class="card" style="margin-bottom:10px">
      <div class="fbw" style="margin-bottom:10px">
        <div><span class="bdg ${sbdg(a.stage)}" style="margin-right:6px">${slbl(a.stage)}</span><span class="bdg bdg-b">${sh?sh.label:a.shift}</span></div>
        <span class="bdg ${effb(eff)}">${eff}%</span>
      </div>
      ${used.map(r=>`<div class="rrow" style="padding:6px 0">
        <div><div class="tsm" style="font-weight:600">${r.machineName||'—'} <span class="tsm tmut">(${(r.runs||[]).length} run${(r.runs||[]).length!==1?'s':''})</span></div>
        <div style="font-size:11px;color:var(--mut)">${(r.runs||[]).map(run=>run.partName||'—').filter((v,i,a)=>a.indexOf(v)===i).join(', ')}</div></div>
        <div style="text-align:right">
          <div class="tsm" style="font-weight:700">${(r.runs||[]).reduce((s,run)=>s+(+run.actualQty||0),0)} pcs</div>
        </div>
      </div>
      ${(r.runs||[]).map((run,ri)=>`<div style="padding:4px 0 4px 12px;border-left:2px solid var(--acc2);margin:2px 0">
        <div style="font-size:12px;font-weight:600">${run.partName||'—'} <span style="font-weight:400;color:var(--mut)">(${run.opName||'—'})</span></div>
        <div style="font-size:11px;color:var(--mut)">${run.hoursRun||'?'}h · ${run.actualQty||0}/${run.targetQty||0} pcs${+run.rejectionQty>0?' · '+run.rejectionQty+' rej':''}</div>
      </div>`).join('')}`).join('')}
      ${(a.machineReports||[]).filter(r=>!r.used).map(r=>`<div class="rrow" style="padding:6px 0">
        <div class="tsm" style="color:var(--mut)">${r.machineName||'—'}</div>
        <span class="bdg bdg-r">Not used${r.unusedReason?' · '+({material:'Material',operator:'Operator',maintenance:'Maintenance',electricity:'Electricity',other:r.unusedOther||'Other'}[r.unusedReason]||''):''}</span>
      </div>`).join('')}
      <div style="display:flex;gap:8px;margin-top:12px;padding-top:10px;border-top:.5px solid var(--bdr)">
        ${isAdmin()?`<button class="btn btn-s btn-sm" style="flex:1" onclick="editActual('${a.id}')">✏️ Edit</button>`:''}

function onMachDragStart(e,id){_dragId=id;_dragEl=e.currentTarget;e.dataTransfer.effectAllowed='move';e.currentTarget.classList.add('is-dragging');}
function onMachDragOver(e){e.preventDefault();e.dataTransfer.dropEffect='move';document.querySelectorAll('.is-drag-item').forEach(el=>el.classList.remove('drag-target'));e.currentTarget.classList.add('drag-target');}
function onMachDrop(e,targetId){e.preventDefault();if(_dragId&&_dragId!==targetId)reorderMachines(_dragId,targetId);onMachDragEnd();}

// Touch drag
let _touchOverId=null;
function onMachTouchStart(e,id){_dragId=id;_dragEl=e.currentTarget.closest('.is-drag-item');_dragEl.classList.add('is-dragging');e.preventDefault();}
function onMachTouchMove(e){
  e.preventDefault();
  const t=e.touches[0];
  document.querySelectorAll('.is-drag-item').forEach(el=>el.classList.remove('drag-target'));
  const els=document.elementsFromPoint(t.clientX,t.clientY);
  const over=els.find(el=>el.classList&&el.classList.contains('is-drag-item')&&el!==_dragEl);
  if(over){over.classList.add('drag-target');_touchOverId=over.dataset.id;}else{_touchOverId=null;}
}
function onMachTouchEnd(e,id){
  if(_touchOverId&&_touchOverId!==_dragId)reorderMachines(_dragId,_touchOverId);
  onMachDragEnd();_touchOverId=null;
}
async function reorderMachines(srcId,tgtId){
  const sorted=[...S.machines].sort((a,b)=>(a.sortOrder||0)-(b.sortOrder||0));
  const si=sorted.findIndex(m=>m.id===srcId),ti=sorted.findIndex(m=>m.id===tgtId);
  if(si===-1||ti===-1)return;
  const[moved]=sorted.splice(si,1);sorted.splice(ti,0,moved);
  try{
    const batch=db.batch();
    sorted.forEach((m,i)=>{batch.update(db.collection('machines').doc(m.id),{sortOrder:i});const sm=S.machines.find(x=>x.id===m.id);if(sm)sm.sortOrder=i;});
    await batch.commit();
    applyMachFilter();toast('Order saved ✓');
  }catch(err){toast('Error: '+err.message);}
}

  try{if(id){await db.collection('users').doc(id).update(d)}else{await db.collection('users').add({...d,createdAt:nowTS()})}await reloadM();closeModal();renderPeople();toast(id?'Updated ✓':'Person added ✓')}
  catch(e){toast('Error: '+e.message)}
}
async function delPers(id){if(id===S.sess.userId){toast('Cannot delete yourself');return}if(!confirm('Delete?'))return;await db.collection('users').doc(id).delete();await reloadM();closeModal();renderPeople();toast('Deleted')}

function renderOps(){
  document.getElementById('s-m-ops').innerHTML=`<div class="hdr"><button class="hdr-back" onclick="goBack()">←</button><div class="hdr-info"><div class="hdr-title">Operations</div><div class="hdr-sub">${S.operations.length} records</div></div><button class="hdr-act" onclick="addOpModal()">+ Add</button></div>

    <div class="mfilt">

function opF(o){return`<div class="f"><label>Operation Name</label><input id="op-n" type="text" value="${o?o.name:''}" placeholder="e.g. Hobbing, Grinding, Shaping..."></div><div class="f"><label>Stage</label><select id="op-s"><option value="soft" ${o&&o.stage==='soft'?'selected':''}>Soft</option><option value="ht" ${o&&o.stage==='ht'?'selected':''}>HT</option><option value="hard" ${o&&o.stage==='hard'?'selected':''}>Hard</option></select></div>`}
function addOpModal(){openModal(`<div class="mtit">Add Operation</div>${opF(null)}<button class="btn btn-p mt12" onclick="saveOp()">Add</button><button class="btn btn-s mt8" onclick="closeModal()">Cancel</button>`)}
function editOpModal(id){const o=S.operations.find(o=>o.id===id);if(!o)return;openModal(`<div class="mtit">Edit Operation</div>${opF(o)}<button class="btn btn-p mt12" onclick="saveOp('${id}')">Update</button>${isAdmin()?`<button class="btn btn-d mt8" onclick="delOp('${id}')">Delete</button>`:''}<button class="btn btn-s mt8" onclick="closeModal()">Cancel</button>`)}
async function saveOp(id){const n=document.getElementById('op-n').value.trim();if(!n){toast('Name required');return}const d={name:n,stage:document.getElementById('op-s').value};try{if(id){await db.collection('operations').doc(id).update(d)}else{await db.collection('operations').add({...d,createdAt:nowTS()})}await reloadM();closeModal();renderOps();toast(id?'Updated ✓':'Operation added ✓')}catch(e){toast('Error: '+e.message)}}
async function delOp(id){if(!confirm('Delete?'))return;await db.collection('operations').doc(id).delete();await reloadM();closeModal();renderOps();toast('Deleted')}

function applyPOFilter(){
  const q=_poSrch.toLowerCase(),ff=_poFilt;
  const list=S.partOps.filter(po=>{
    const p=S.parts.find(x=>x.id===po.partId),o=S.operations.find(x=>x.id===po.opId);
    const pn=(p?p.name:'').toLowerCase(),on=(o?o.name:'').toLowerCase();
    const mq=!q||pn.includes(q)||on.includes(q);
    const mf=ff==='all'||(ff==='part'&&pn.includes(q))||(ff==='op'&&on.includes(q));
    return mq&&(ff==='all'||mf);
  });
  const w=document.getElementById('po-list');if(!w)return;
  w.innerHTML=list.length===0?`<div class="empty"><div class="empty-ic">📐</div><h3>No results</h3></div>`:
    list.map(po=>{const p=S.parts.find(x=>x.id===po.partId),o=S.operations.find(x=>x.id===po.opId);
    return`<div class="li"><div class="lic">📐</div><div class="lib"><div class="linm">${p?p.name:'Unknown Part'}</div><div class="lisb">${o?o.name:'Unknown Op'} · ${po.cycleTime} min/pc · Target: ${po.targetQty} pcs/shift</div></div><div class="liac"><button class="btn btn-s btn-sm" onclick="editPOModal('${po.id}')">Edit</button>${isAdmin()?`<button class="btn btn-d btn-sm" onclick="delPO('${po.id}')">Del</button>`:''}</div></div>`;}).join('');
}
function renderPartOps(){
  document.getElementById('s-m-partops').innerHTML=`<div class="hdr"><button class="hdr-back" onclick="goBack()">←</button><div class="hdr-info"><div class="hdr-title">Part-Operations</div><div class="hdr-sub">Cycle times &amp; targets</div></div><button class="hdr-act" onclick="addPOModal()">+ Add</button></div>
  <div class="pad">
    <div class="ibox">When you select Part + Operation in Actual Output, the target qty auto-fills from here.</div>
    <div class="mfilt">
      <input type="search" placeholder="Search part or operation..." oninput="_poSrch=this.value;applyPOFilter()">

    </div>
    <div id="po-list"></div>
  </div>`;

}
function poF(po){return`<div class="f"><label>Part</label><select id="po-p">${S.parts.map(p=>`<option value="${p.id}" ${po&&po.partId===p.id?'selected':''}>${p.name} (${p.no})</option>`).join('')}</select></div><div class="f"><label>Operation</label><select id="po-o">${S.operations.map(o=>`<option value="${o.id}" ${po&&po.opId===o.id?'selected':''}>${o.name} (${slbl(o.stage)})</option>`).join('')}</select></div><div class="f"><label>Machine (optional)</label><select id="po-m"><option value="">— Not machine-specific —</option>${S.machines.map(m=>`<option value="${m.id}" ${po&&po.machineId===m.id?'selected':''}>${m.name} (${slbl(m.stage)})</option>`).join('')}</select></div><div class="row2"><div class="f"><label>Cycle Time (min/pc)</label><input id="po-c" type="number" value="${po?po.cycleTime:''}" min="0" step="0.1" placeholder="e.g. 4.5" oninput="autoCalcTarget()"></div><div class="f"><label>Target Qty / Shift <span style="color:var(--mut);font-weight:400">(auto)</span></label><input id="po-t" type="number" value="${po?po.targetQty:''}" min="0" placeholder="Auto-calculated"></div></div>`}
function autoCalcTarget(){const ct=parseFloat(document.getElementById('po-c').value);const tEl=document.getElementById('po-t');if(ct>0&&tEl){tEl.value=Math.round(450/ct)}}
function addPOModal(){openModal(`<div class="mtit">Add Part-Operation</div>${poF(null)}<button class="btn btn-p mt12" onclick="savePO()">Add</button><button class="btn btn-s mt8" onclick="closeModal()">Cancel</button>`)}
function editPOModal(id){const po=S.partOps.find(po=>po.id===id);if(!po)return;openModal(`<div class="mtit">Edit Part-Operation</div>${poF(po)}<button class="btn btn-p mt12" onclick="savePO('${id}')">Update</button>${isAdmin()?`<button class="btn btn-d mt8" onclick="delPO('${id}')">Delete</button>`:''}<button class="btn btn-s mt8" onclick="closeModal()">Cancel</button>`)}
async function savePO(id){const pi=document.getElementById('po-p').value,oi=document.getElementById('po-o').value;if(!pi||!oi){toast('Part and operation required');return}const mi=document.getElementById('po-m').value;const d={partId:pi,opId:oi,machineId:mi||'',cycleTime:parseFloat(document.getElementById('po-c').value)||0,targetQty:parseInt(document.getElementById('po-t').value)||0};try{if(id){await db.collection('partOps').doc(id).update(d)}else{await db.collection('partOps').add({...d,createdAt:nowTS()})}await reloadM();closeModal();renderPartOps();toast(id?'Updated ✓':'Added ✓')}catch(e){toast('Error: '+e.message)}}
async function delPO(id){if(!confirm('Delete?'))return;await db.collection('partOps').doc(id).delete();await reloadM();closeModal();renderPartOps();toast('Deleted')}

function renderShifts(){document.getElementById('s-m-shifts').innerHTML=`<div class="hdr"><button class="hdr-back" onclick="goBack()">←</button><div class="hdr-info"><div class="hdr-title">Shift Timings</div></div></div><div class="pad"><div class="wbox">Changes here affect shift display across the entire app.</div>${Object.entries(S.shifts).map(([k,v])=>`<div class="card"><div class="card-hd">${v.label}</div><div class="row2"><div class="f"><label>Start Time</label><input type="time" id="sh-${k}-s" value="${v.start}"></div><div class="f"><label>End Time</label><input type="time" id="sh-${k}-e" value="${v.end}"></div></div><div class="f" style="margin:0"><label>Label</label><input type="text" id="sh-${k}-l" value="${v.label}"></div></div>`).join('')}<button class="btn btn-p" onclick="saveShifts()">Save Timings</button></div>`}
async function saveShifts(){const sh={};Object.keys(S.shifts).forEach(k=>{sh[k]={start:document.getElementById('sh-'+k+'-s').value,end:document.getElementById('sh-'+k+'-e').value,label:document.getElementById('sh-'+k+'-l').value}});await db.collection('config').doc('shifts').set(sh);S.shifts=sh;toast('Shift timings saved ✓');go('masters');renderMasters()}

function logout(){S.listeners.forEach(u=>u());S.listeners=[];sSess(null);location.reload()}

function initBackBtn(){
  window.history.pushState({imf:true},'');
  window.addEventListener('popstate',()=>{
    window.history.pushState({imf:true},'');
    goBack();
  });
}

async function init(){
  try{
    const us=await db.collection('users').limit(1).get();
    if(us.empty){showSetup();return}
    await loadMasters();
    const sess=gSess();
    if(!sess){showLogin();return}
    const u=S.users.find(u=>u.id===sess.userId);
    if(!u){sSess(null);showLogin();return}
    S.sess=sess;setupListeners();renderApp();initBackBtn();
  }catch(e){
    document.getElementById('app').innerHTML=`<div class="loading"><div style="color:#fff;text-align:center"><div class="lspin" style="margin:0 auto 16px"></div><div style="font-size:14px">Connecting...</div><div style="font-size:12px;margin-top:8px;opacity:.6">${e.message}</div><div style="margin-top:16px"><button onclick="init()" style="background:var(--acc);color:#fff;border:none;padding:10px 20px;border-radius:8px;cursor:pointer;font-size:14px">Retry</button></div></div></div>`;
  }
}

if('serviceWorker' in navigator){
  let _swReg=null;
  window.addEventListener('load',()=>{
    navigator.serviceWorker.register('./sw.js').then(reg=>{
      _swReg=reg;
      reg.update(); // check for new version on every load

      function showUpdateBanner(){
        if(document.getElementById('sw-update-banner'))return;
        const b=document.createElement('div');
        b.id='sw-update-banner';
        b.style='position:fixed;top:0;left:0;right:0;background:#1e3a8a;color:#fff;padding:12px 16px;display:flex;align-items:center;justify-content:space-between;z-index:99999;font-size:13px;font-weight:500;gap:12px';
        b.innerHTML='<span>🔄 New version available</span><button id="sw-update-btn" style="background:#fff;color:#1e3a8a;border:none;padding:7px 16px;border-radius:6px;font-weight:700;font-size:12px;cursor:pointer;flex-shrink:0">Update Now</button>';
        document.body.appendChild(b);
        document.getElementById('sw-update-btn').onclick=()=>{
          if(_swReg&&_swReg.waiting){
            _swReg.waiting.postMessage('skipWaiting');
          } else {
            window.location.reload(true);
          }
        };
      }

      // New SW found while page is open
      reg.addEventListener('updatefound',()=>{
        const nw=reg.installing;
        nw.addEventListener('statechange',()=>{
          // 'installed' means new SW is waiting — show banner
          if(nw.state==='installed'&&navigator.serviceWorker.controller){
            showUpdateBanner();
          }
        });
      });

      // If there's already a waiting SW when page loads (e.g. user had tab open)
      if(reg.waiting&&navigator.serviceWorker.controller){
        showUpdateBanner();
      }

      // After user taps Update, new SW activates — reload to use it
      navigator.serviceWorker.addEventListener('controllerchange',()=>{
        window.location.reload();
      });
    }).catch(()=>{});
  });
}
window.addEventListener('DOMContentLoaded',init);
window.addEventListener('scroll',hideGlobalDrop,true);
